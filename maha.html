<!DOCTYPE html>
<html>
<head>
    <title>Task Management System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input, select, button, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }
        button {
            background: #242629;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #303234;
        }
        .task {
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
        .high { background: #ffcccc; }
        .medium { background: #fff3cd; }
        .low { background: #d4edda; }
        .actions button {
            width: auto;
            margin-right: 5px;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Task Management System</h2>

    <input type="hidden" id="editId">

    <input type="text" id="title" placeholder="Task Title">
    <textarea id="description" placeholder="Task Description"></textarea>
    <input type="date" id="dueDate">
    <select id="priority">
        <option value="">Select Priority</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
    </select>

    <button onclick="addTask()">Add Task</button>

    <hr>

   
    <input type="text" id="search" placeholder="Search by title..." onkeyup="displayTasks()">

    <select id="filter" onchange="displayTasks()">
        <option value="">All Priorities</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
    </select>

   
    <div id="taskList"></div>
</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];


function addTask() {
    let title = document.getElementById("title").value.trim();
    let description = document.getElementById("description").value.trim();
    let dueDate = document.getElementById("dueDate").value;
    let priority = document.getElementById("priority").value;
    let editId = document.getElementById("editId").value;


    if (title === "" || dueDate === "") {
        alert("Title and Due Date are required!");
        return;
    }

    if (editId) {
        
        tasks = tasks.map(task =>
            task.id == editId ? { id: editId, title, description, dueDate, priority } : task
        );
    } else {
       
        let newTask = {
            id: Date.now(),  
            title,
            description,
            dueDate,
            priority
        };
        tasks.push(newTask);
    }

    localStorage.setItem("tasks", JSON.stringify(tasks));
    clearFields();
    displayTasks();
}


function displayTasks() {
    let taskList = document.getElementById("taskList");
    let search = document.getElementById("search").value.toLowerCase();
    let filter = document.getElementById("filter").value;

    taskList.innerHTML = "";

    let filteredTasks = tasks.filter(task =>
        task.title.toLowerCase().includes(search) &&
        (filter === "" || task.priority === filter)
    );

    filteredTasks.forEach(task => {
        let div = document.createElement("div");
        div.className = "task " + task.priority;

        div.innerHTML = `
            <h3>${task.title}</h3>
            <p>${task.description}</p>
            <p><strong>Due:</strong> ${task.dueDate}</p>
            <p><strong>Priority:</strong> ${task.priority}</p>
            <div class="actions">
                <button onclick="editTask(${task.id})">Edit</button>
                <button onclick="deleteTask(${task.id})">Delete</button>
            </div>
        `;

        taskList.appendChild(div);
    });
}


function editTask(id) {
    let task = tasks.find(t => t.id == id);

    document.getElementById("title").value = task.title;
    document.getElementById("description").value = task.description;
    document.getElementById("dueDate").value = task.dueDate;
    document.getElementById("priority").value = task.priority;
    document.getElementById("editId").value = task.id;
}


function deleteTask(id) {
    tasks = tasks.filter(task => task.id != id);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    displayTasks();
}


function clearFields() {
    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
    document.getElementById("dueDate").value = "";
    document.getElementById("priority").value = "";
    document.getElementById("editId").value = "";
}


displayTasks();

</script>

</body>
</html>
